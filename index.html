<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML Box Visualizer Pro</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
body{font-family:Arial,sans-serif;margin:20px;background:#f5f5f5}
textarea{width:100%;height:220px;font-family:monospace}
button,input{margin:5px;padding:8px}
#viewport{border:1px solid #ccc;background:#fff;overflow:auto;height:70vh}
#diagram{transform-origin:0 0;padding:20px}
.box{border:2px solid #888;background:#ececec;margin:10px;padding:10px}
.header{font-weight:bold;cursor:pointer}
.children{margin-left:15px}
.hidden{display:none}
</style>
</head>
<body>
<h2>HTML → Rectangle Diagram Converter</h2>
<textarea id="htmlInput"><html><head><title>Demo</title></head><body><header><h1>Hello</h1></header><main><section><p>Text</p></section></main></body></html></textarea><br>
<button onclick="convertHTML()">Convert</button>
<button onclick="savePNG()">Save PNG</button>
<button onclick="zoomIn()">Zoom +</button>
<button onclick="zoomOut()">Zoom -</button>
<input id="search" placeholder="Search tag..." oninput="filterTags()">
<div id="viewport"><div id="diagram"></div></div>

<script>
const SKIP=['script','style','meta','link','noscript'];
let scale=1;

function createNode(node,depth=0,maxDepth=15){
 if(depth>maxDepth) return null;
 if(node.nodeType!==1) return null;
 const tag=node.tagName.toLowerCase();
 if(SKIP.includes(tag)) return null;

 const box=document.createElement('div');
 box.className='box';
 box.dataset.tag=tag;

 const children=[...node.children].filter(n=>!SKIP.includes(n.tagName.toLowerCase()));
 const head=document.createElement('div');
 head.className='header';
 head.textContent=`<${tag}> (${children.length} children)`;
 box.appendChild(head);

 const wrap=document.createElement('div');
 wrap.className='children';

 head.onclick=()=>wrap.classList.toggle('hidden');

 children.forEach(c=>{
   const child=createNode(c,depth+1,maxDepth);
   if(child) wrap.appendChild(child);
 });

 box.appendChild(wrap);
 return box;
}

function convertHTML(){
 const html=document.getElementById('htmlInput').value;
 const parser=new DOMParser();
 const doc=parser.parseFromString(html,'text/html');
 const root=createNode(doc.documentElement);
 const diagram=document.getElementById('diagram');
 diagram.innerHTML='';
 if(root) diagram.appendChild(root);
}

async function savePNG(){
 const canvas=await html2canvas(document.getElementById('diagram'),{scale:2,backgroundColor:'#fff'});
 const a=document.createElement('a');
 a.download='diagram.png';
 a.href=canvas.toDataURL();
 a.click();
}

function zoomIn(){scale+=0.1;document.getElementById('diagram').style.transform=`scale(${scale})`;}
function zoomOut(){scale=Math.max(0.2,scale-0.1);document.getElementById('diagram').style.transform=`scale(${scale})`;}

function filterTags(){
 const q=document.getElementById('search').value.toLowerCase();
 document.querySelectorAll('.box').forEach(b=>{
   b.style.display=!q || b.dataset.tag.includes(q)?'block':'none';
 });
}

convertHTML();
</script>
</body>
</html>
